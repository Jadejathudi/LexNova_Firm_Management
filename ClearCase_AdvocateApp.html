<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Clear Case for Advocates</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#F8FAFF;color:#1A1A2E}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.fade-up{animation:fadeUp 0.4s ease forwards}
.pulse{animation:pulse 2s ease-in-out infinite}
.btn-gold{background:#C9A84C;color:#1E2761;border:none;border-radius:8px;padding:10px 24px;font-size:14px;font-weight:700;cursor:pointer;font-family:system-ui,sans-serif}
.btn-navy{background:#1E2761;color:#fff;border:none;border-radius:8px;padding:10px 24px;font-size:14px;font-weight:700;cursor:pointer;font-family:system-ui,sans-serif}
.btn-outline{background:transparent;color:#1E2761;border:1.5px solid #1E2761;border-radius:8px;padding:10px 24px;font-size:14px;font-weight:600;cursor:pointer;font-family:system-ui,sans-serif}
.btn-ghost{background:transparent;color:#6B7280;border:1px solid #E5E7EB;border-radius:8px;padding:9px 18px;font-size:13px;font-weight:600;cursor:pointer;font-family:system-ui,sans-serif}
.btn-danger{background:#fff;color:#DC2626;border:1.5px solid #DC2626;border-radius:8px;padding:10px 24px;font-size:14px;font-weight:600;cursor:pointer;font-family:system-ui,sans-serif}
input,select,textarea{border:1.5px solid #D1D5DB;border-radius:8px;padding:10px 14px;font-size:14px;width:100%;font-family:system-ui,sans-serif;outline:none;background:#fff;color:#1A1A2E}
input:focus,select:focus,textarea:focus{border-color:#1E2761}
.card{background:#fff;border-radius:14px;padding:22px;border:1px solid #E5E7EB}
.card-hover:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,0.08)}
.card-hover{transition:transform 0.2s,box-shadow 0.2s;cursor:pointer}
.nav-item{display:flex;align-items:center;gap:12px;padding:11px 16px;border-radius:10px;color:rgba(255,255,255,0.65);font-size:14px;font-weight:600;cursor:pointer;transition:background 0.15s}
.nav-item:hover{background:rgba(255,255,255,0.06);color:#fff}
.nav-item.active{background:rgba(201,168,76,0.15);color:#C9A84C;border-left:3px solid #C9A84C;padding-left:13px}
</style>
</head>
<body>
<div id="app"></div>
<script>
const NAVY="#1E2761",GOLD="#C9A84C",BG="#F8FAFF",DARK="#1A1A2E",GRAY="#6B7280",WHITE="#fff",GREEN="#16A34A",RED="#DC2626",LIGHT="#EEF2FF",AMBER="#F59E0B";

const ME={
  name:"Adv. Meera Krishnamurthy",ini:"MK",exp:14,specs:["Criminal","Family","Civil"],
  state:"Telangana",city:"Hyderabad",rating:4.9,reviews:63,success:81,cases:420,
  barNo:"TS/HC/2011/1234",langs:["Telugu","English","Hindi"]
};

const REQUESTS=[
  {id:1,name:"Rahul Sharma",ini:"RS",matter:"Criminal",city:"Hyderabad",when:"Today, 11:00 AM",type:"video",brief:"FIR filed against me under section 420. Need urgent guidance on bail and next steps.",submitted:"2 hours ago",priority:"high"},
  {id:2,name:"Priya Reddy",ini:"PR",matter:"Family",city:"Secunderabad",when:"Tomorrow, 2:00 PM",type:"phone",brief:"Mutual divorce proceedings. Already separated for 18 months. Need to understand the process and timeline.",submitted:"5 hours ago",priority:"normal"},
  {id:3,name:"Anjaneyulu G.",ini:"AG",matter:"Civil",city:"Warangal",when:"Fri 14 Mar, 3:30 PM",type:"office",brief:"Inherited ancestral property dispute with siblings. Patta documents available.",submitted:"Yesterday",priority:"normal"},
  {id:4,name:"Fathima Begum",ini:"FB",matter:"Family",city:"Hyderabad",when:"Mon 17 Mar, 10:00 AM",type:"video",brief:"Custody matter — exploring options for child welfare.",submitted:"Yesterday",priority:"normal"},
];

const TODAY_SESSIONS=[
  {time:"09:30 AM",name:"Vikram Joshi",matter:"Banking",type:"video",status:"completed",duration:"32 min"},
  {time:"11:00 AM",name:"Rahul Sharma",matter:"Criminal",type:"video",status:"upcoming",duration:"30 min"},
  {time:"02:00 PM",name:"Sneha Patil",matter:"Civil",type:"phone",status:"upcoming",duration:"30 min"},
  {time:"04:30 PM",name:"K. Ramesh",matter:"Family",type:"office",status:"upcoming",duration:"45 min"},
];

const RETAINED=[
  {name:"Vikram Joshi",ini:"VJ",plan:"Standard",since:"Jan 2025",matter:"Banking dispute",status:"Active hearing",next:"15 Mar",unread:2},
  {name:"Lakshmi Industries",ini:"LI",plan:"Premium",since:"Nov 2024",matter:"NCLT matter",status:"Documents pending",next:"22 Mar",unread:0},
  {name:"K. Ramesh",ini:"KR",plan:"Essential",since:"Feb 2025",matter:"Property partition",status:"Awaiting verdict",next:"—",unread:1},
  {name:"Sneha Patil",ini:"SP",plan:"Standard",since:"Dec 2024",matter:"Consumer complaint",status:"Resolved",next:"—",unread:0},
];

const SPEC_COLORS={Criminal:"#B91C1C",Civil:"#1D4ED8",Family:"#7C3AED",Corporate:"#0F766E",Banking:"#0369A1","Real Estate":"#C2410C",Consumer:"#0E7490",Revenue:"#92400E"};

let state={
  screen:"landing",onbStep:1,
  onbForm:{name:"",barNo:"",exp:"",state:"Telangana",city:"",specs:[],bio:""},
  reqDetail:null,sessionSecs:1620,sessionPhase:"active",
  availability:{Mon:true,Tue:true,Wed:false,Thu:true,Fri:true,Sat:false,Sun:false},
};

let sessionTimer=null;
function setState(p){Object.assign(state,p);render();}
function go(s){setState({screen:s});window.scrollTo(0,0);}
function fmt(s){return String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0');}
function renderStars(r){return '★'.repeat(Math.round(r))+'☆'.repeat(5-Math.round(r));}
function SpecBadge(s){const c=SPEC_COLORS[s]||NAVY;return `<span style="font-size:11px;background:${c}18;color:${c};border-radius:20px;padding:3px 10px;font-weight:600;white-space:nowrap">${s}</span>`;}

function startSession(){
  setState({screen:"liveSession",sessionPhase:"active",sessionSecs:1620});
  if(sessionTimer)clearInterval(sessionTimer);
  sessionTimer=setInterval(()=>{
    if(state.sessionPhase!=="active"){clearInterval(sessionTimer);return;}
    const s=state.sessionSecs-1;
    if(s<=0){setState({sessionSecs:0,sessionPhase:"ended"});clearInterval(sessionTimer);}
    else setState({sessionSecs:s});
  },1000);
}

// ============ LANDING ============
function renderLanding(){
  return `
  <div style="background:${NAVY};padding:0 48px;height:60px;display:flex;align-items:center;gap:32px;position:sticky;top:0;z-index:50">
    <span style="display:flex;align-items:center;gap:8px;color:${WHITE};font-size:17px;font-weight:800;font-family:Georgia,serif">⚖️ CLEAR CASE <span style="color:${GOLD};font-size:11px;font-weight:600;border:1px solid ${GOLD};border-radius:4px;padding:2px 6px;letter-spacing:0.05em">FOR ADVOCATES</span></span>
    <div style="flex:1"></div>
    <span style="color:rgba(255,255,255,0.6);font-size:14px;cursor:pointer">Sign In</span>
    <button class="btn-gold" onclick="go('onboarding')" style="padding:9px 20px">Apply to Join</button>
  </div>
  <div style="background:linear-gradient(135deg,${NAVY} 0%,#0D1440 100%);padding:90px 48px 70px;text-align:center">
    <div style="max-width:780px;margin:0 auto">
      <div style="display:inline-block;background:rgba(201,168,76,0.15);border:1px solid rgba(201,168,76,0.35);border-radius:20px;padding:5px 16px;margin-bottom:22px">
        <span style="color:${GOLD};font-size:13px;font-weight:600">By invitation · Bar-verified advocates only</span>
      </div>
      <h1 style="color:${WHITE};font-size:50px;font-weight:800;line-height:1.1;margin-bottom:20px;font-family:Georgia,serif">Build the practice<br><span style="color:${GOLD}">you deserve.</span></h1>
      <p style="color:rgba(255,255,255,0.7);font-size:17px;line-height:1.7;margin-bottom:36px">Clear Case brings serious clients to your chamber. You set your hours. We handle discovery, scheduling, payments, and the awkward money talk.</p>
      <div style="display:flex;gap:14px;justify-content:center;flex-wrap:wrap">
        <button class="btn-gold" onclick="go('onboarding')" style="padding:14px 36px;font-size:15px">Apply to Join →</button>
        <button onclick="go('dashboard')" style="background:transparent;color:${WHITE};border:1.5px solid rgba(255,255,255,0.3);border-radius:8px;padding:14px 36px;font-size:15px;font-weight:600;cursor:pointer">View Demo Dashboard</button>
      </div>
    </div>
    <div style="margin-top:64px;display:grid;grid-template-columns:repeat(4,1fr);gap:32px;max-width:900px;margin-left:auto;margin-right:auto">
      ${[
        {n:"₹0",l:"Joining fee"},{n:"15%",l:"Platform commission"},{n:"48 hrs",l:"Verification turnaround"},{n:"T+2",l:"Payouts to your account"}
      ].map(x=>`<div><div style="color:${GOLD};font-size:32px;font-weight:800;font-family:Georgia,serif">${x.n}</div><div style="color:rgba(255,255,255,0.55);font-size:13px;margin-top:4px">${x.l}</div></div>`).join('')}
    </div>
  </div>
  <div style="background:${WHITE};padding:72px 48px">
    <div style="max-width:1100px;margin:0 auto">
      <div style="text-align:center;margin-bottom:52px">
        <h2 style="font-size:32px;color:${NAVY};font-weight:800;font-family:Georgia,serif">Why advocates are joining</h2>
        <p style="color:${GRAY};font-size:15px;margin-top:10px">A platform built by people who respect what you do.</p>
      </div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:28px">
        ${[
          {i:"🎯",t:"Pre-qualified clients",d:"Every client fills a detailed brief before they reach you. No tyre-kickers. No 11pm WhatsApp emergencies from strangers."},
          {i:"📅",t:"You own your calendar",d:"Block off court days. Set your slots. Decline what doesn't fit. We never overbook you, never share your number publicly."},
          {i:"💰",t:"Transparent payouts",d:"Free consultations are on us — we pay you a fixed sitting fee. Retainer earnings hit your bank in 2 days. GST invoices generated automatically."},
          {i:"🛡️",t:"Reputation, protected",d:"Reviews are moderated. Frivolous complaints are filtered. Your years of work aren't held hostage by one bad day."},
          {i:"📊",t:"Real practice analytics",d:"See where your time goes. Which matters convert. Which clients retain. Run your practice like a business, finally."},
          {i:"⚖️",t:"Bar Council compliant",d:"Every workflow is reviewed against BCI advertising rules. You stay on the right side of the line, always."},
        ].map(x=>`<div style="background:${LIGHT};border-radius:16px;padding:26px;border-top:3px solid ${GOLD}">
          <div style="font-size:30px;margin-bottom:12px">${x.i}</div>
          <h3 style="color:${NAVY};font-size:16px;font-weight:700;margin-bottom:10px;font-family:Georgia,serif">${x.t}</h3>
          <p style="color:${GRAY};font-size:13px;line-height:1.7">${x.d}</p>
        </div>`).join('')}
      </div>
    </div>
  </div>
  <div style="background:${NAVY};padding:60px 48px;text-align:center">
    <h2 style="color:${WHITE};font-size:28px;font-weight:800;font-family:Georgia,serif;margin-bottom:14px">Ready to apply?</h2>
    <p style="color:rgba(255,255,255,0.6);font-size:14px;margin-bottom:28px">Verification takes 48 hours. We need your Bar Council enrolment number and a current photograph.</p>
    <button class="btn-gold" onclick="go('onboarding')" style="padding:14px 40px;font-size:15px">Start Application →</button>
  </div>
  <div style="background:${DARK};padding:24px 48px;text-align:center"><p style="color:rgba(255,255,255,0.4);font-size:13px">© 2025 Clear Case Legal Services · Hyderabad · DPDP Act 2023 Compliant</p></div>`;
}

// ============ ONBOARDING ============
function renderOnboarding(){
  const {onbStep,onbForm}=state;
  const allSpecs=["Criminal","Civil","Family","Corporate","Banking","Real Estate","Consumer","Revenue"];
  return `
  <div style="background:${NAVY};padding:0 48px;height:60px;display:flex;align-items:center;gap:32px">
    <span style="display:flex;align-items:center;gap:8px;color:${WHITE};font-size:17px;font-weight:800;font-family:Georgia,serif">⚖️ CLEAR CASE <span style="color:${GOLD};font-size:11px;font-weight:600;border:1px solid ${GOLD};border-radius:4px;padding:2px 6px">FOR ADVOCATES</span></span>
    <div style="flex:1"></div>
    <span onclick="go('landing')" style="color:rgba(255,255,255,0.6);font-size:13px;cursor:pointer">Need help? Call +91 40 4567 8900</span>
  </div>
  <div style="min-height:100vh;background:${BG};padding:50px 20px">
    <div style="max-width:560px;margin:0 auto">
      <div onclick="go('landing')" style="color:${GRAY};font-size:14px;cursor:pointer;margin-bottom:24px">← Back</div>
      <div class="card" style="padding:36px">
        <div style="display:flex;gap:8px;margin-bottom:24px">
          ${[1,2,3,4].map(i=>`<div style="flex:1;height:4px;border-radius:2px;background:${i<=onbStep?GOLD:'#E5E7EB'};transition:background 0.3s"></div>`).join('')}
        </div>
        <div style="margin-bottom:24px">
          <div style="color:${GRAY};font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:0.05em">Step ${onbStep} of 4</div>
          <h2 style="font-size:22px;font-weight:800;color:${NAVY};font-family:Georgia,serif;margin-top:6px">${
            onbStep===1?"Identity & Bar verification":
            onbStep===2?"Your practice":
            onbStep===3?"Set your availability":
            "Review & submit"}</h2>
        </div>
        ${onbStep===1?`
          <div style="display:flex;flex-direction:column;gap:16px">
            <div><label style="font-size:12px;font-weight:700;color:${NAVY};text-transform:uppercase;letter-spacing:0.05em;display:block;margin-bottom:6px">Full Name (as on Bar Council roll) *</label>
            <input placeholder="Adv. Your full name" value="${onbForm.name}" oninput="setState({onbForm:{...state.onbForm,name:this.value}})"/></div>
            <div><label style="font-size:12px;font-weight:700;color:${NAVY};text-transform:uppercase;letter-spacing:0.05em;display:block;margin-bottom:6px">Bar Council Enrolment No. *</label>
            <input placeholder="e.g. TS/HC/2011/1234" value="${onbForm.barNo}" oninput="setState({onbForm:{...state.onbForm,barNo:this.value}})"/></div>
            <div style="background:${LIGHT};border-radius:10px;padding:14px;font-size:13px;color:${GRAY};line-height:1.6">🔒 We verify directly with the State Bar Council. Your number is never shown publicly without your permission.</div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
              <div><label style="font-size:12px;font-weight:700;color:${NAVY};text-transform:uppercase;letter-spacing:0.05em;display:block;margin-bottom:6px">State *</label>
              <select onchange="setState({onbForm:{...state.onbForm,state:this.value}})">
                <option ${onbForm.state==="Telangana"?"selected":""}>Telangana</option>
                <option ${onbForm.state==="Andhra Pradesh"?"selected":""}>Andhra Pradesh</option>
              </select></div>
              <div><label style="font-size:12px;font-weight:700;color:${NAVY};text-transform:uppercase;letter-spacing:0.05em;display:block;margin-bottom:6px">City *</label>
              <input placeholder="e.g. Hyderabad" value="${onbForm.city}" oninput="setState({onbForm:{...state.onbForm,city:this.value}})"/></div>
            </div>
            <div><label style="font-size:12px;font-weight:700;color:${NAVY};text-transform:uppercase;letter-spacing:0.05em;display:block;margin-bottom:6px">Years of practice *</label>
            <input type="number" placeholder="e.g. 14" value="${onbForm.exp}" oninput="setState({onbForm:{...state.onbForm,exp:this.value}})"/></div>
            <button class="btn-navy" onclick="setState({onbStep:2})" style="width:100%;padding:13px;margin-top:6px">Continue →</button>
          </div>
        `:onbStep===2?`
          <div style="display:flex;flex-direction:column;gap:16px">
            <div><label style="font-size:12px;font-weight:700;color:${NAVY};text-transform:uppercase;letter-spacing:0.05em;display:block;margin-bottom:10px">Areas of practice * <span style="color:${GRAY};font-weight:500;text-transform:none;letter-spacing:0">(pick all that apply)</span></label>
            <div style="display:flex;flex-wrap:wrap;gap:8px">
              ${allSpecs.map(s=>{const on=onbForm.specs.includes(s);return `<div onclick="toggleSpec('${s}')" style="padding:8px 16px;border-radius:20px;border:1.5px solid ${on?NAVY:'#E5E7EB'};background:${on?NAVY:WHITE};color:${on?WHITE:DARK};font-size:13px;font-weight:600;cursor:pointer">${on?'✓ ':''}${s}</div>`}).join('')}
            </div></div>
            <div><label style="font-size:12px;font-weight:700;color:${NAVY};text-transform:uppercase;letter-spacing:0.05em;display:block;margin-bottom:6px">Short professional bio</label>
            <textarea rows="4" placeholder="A few lines about your practice, notable matters, why clients choose you..." style="resize:none" oninput="setState({onbForm:{...state.onbForm,bio:this.value}})">${onbForm.bio}</textarea>
            <div style="font-size:11px;color:${GRAY};margin-top:4px">Reviewed against BCI advertising guidelines. Avoid superlatives.</div></div>
            <div style="display:flex;gap:10px"><button class="btn-ghost" onclick="setState({onbStep:1})" style="flex:1;padding:12px">← Back</button>
            <button class="btn-navy" onclick="setState({onbStep:3})" style="flex:2;padding:13px">Continue →</button></div>
          </div>
        `:onbStep===3?`
          <div style="display:flex;flex-direction:column;gap:16px">
            <p style="color:${GRAY};font-size:14px;line-height:1.6">Tick the days you typically take consultations. You can fine-tune slot timings later from your dashboard.</p>
            <div style="display:flex;gap:8px">
              ${["Mon","Tue","Wed","Thu","Fri","Sat","Sun"].map(d=>{const on=state.availability[d];return `<div onclick="toggleDay('${d}')" style="flex:1;padding:14px 4px;border-radius:10px;border:1.5px solid ${on?NAVY:'#E5E7EB'};background:${on?LIGHT:WHITE};cursor:pointer;text-align:center"><div style="font-size:12px;font-weight:600;color:${on?NAVY:GRAY}">${d}</div><div style="font-size:16px;margin-top:4px">${on?'✓':'—'}</div></div>`}).join('')}
            </div>
            <div style="background:#FFF8E8;border-radius:10px;padding:14px;border-left:3px solid ${GOLD};font-size:13px;color:#7A5A00;line-height:1.6">💡 Free consultations are 30 minutes. We'll never schedule one without your explicit acceptance — every request goes to your inbox first.</div>
            <div style="display:flex;gap:10px"><button class="btn-ghost" onclick="setState({onbStep:2})" style="flex:1;padding:12px">← Back</button>
            <button class="btn-navy" onclick="setState({onbStep:4})" style="flex:2;padding:13px">Continue →</button></div>
          </div>
        `:`
          <div style="display:flex;flex-direction:column;gap:14px">
            <div style="background:${LIGHT};border-radius:12px;padding:18px">
              <div style="font-size:11px;font-weight:700;color:${GRAY};text-transform:uppercase;letter-spacing:0.05em;margin-bottom:10px">Application summary</div>
              <div style="font-size:14px;color:${DARK};line-height:1.9">
                <b>${onbForm.name||"—"}</b><br>
                Bar No: ${onbForm.barNo||"—"}<br>
                ${onbForm.exp||"—"} years · ${onbForm.city||"—"}, ${onbForm.state}<br>
                Practice: ${onbForm.specs.join(", ")||"—"}
              </div>
            </div>
            <div style="background:#FFF8E8;border-radius:10px;padding:14px;font-size:13px;color:#7A5A00;line-height:1.6">⏱ We'll verify your enrolment with the ${onbForm.state} Bar Council within 48 hours. You'll receive an SMS once your profile is live.</div>
            <div style="display:flex;gap:8px;align-items:flex-start;font-size:12px;color:${GRAY};line-height:1.6"><input type="checkbox" style="width:auto;margin-top:3px"/><span>I agree to Clear Case's Advocate Code of Conduct, BCI advertising compliance, and confirm all information provided is accurate.</span></div>
            <div style="display:flex;gap:10px;margin-top:6px"><button class="btn-ghost" onclick="setState({onbStep:3})" style="flex:1;padding:12px">← Back</button>
            <button class="btn-gold" onclick="go('dashboard')" style="flex:2;padding:14px">Submit Application →</button></div>
          </div>
        `}
      </div>
    </div>
  </div>`;
}

// ============ APP SHELL with sidebar ============
function Shell(active,inner){
  const items=[
    {k:"dashboard",l:"Dashboard",i:"⊟"},
    {k:"requests",l:"Requests",i:"📨",badge:REQUESTS.length},
    {k:"calendar",l:"Calendar",i:"📅"},
    {k:"clients",l:"Retained Clients",i:"👥"},
    {k:"earnings",l:"Earnings",i:"₹"},
    {k:"profile",l:"My Profile",i:"⚖️"},
  ];
  return `
  <div style="display:grid;grid-template-columns:240px 1fr;min-height:100vh">
    <aside style="background:${NAVY};padding:24px 16px;display:flex;flex-direction:column;gap:8px;position:sticky;top:0;height:100vh">
      <div style="padding:0 12px 20px;border-bottom:1px solid rgba(255,255,255,0.08);margin-bottom:14px">
        <div style="display:flex;align-items:center;gap:8px;color:${WHITE};font-size:15px;font-weight:800;font-family:Georgia,serif">⚖️ LEX NOVA</div>
        <div style="color:${GOLD};font-size:10px;font-weight:600;letter-spacing:0.1em;margin-top:4px">FOR ADVOCATES</div>
      </div>
      ${items.map(it=>`<div class="nav-item ${active===it.k?'active':''}" onclick="go('${it.k}')">
        <span style="font-size:16px;width:18px;text-align:center">${it.i}</span>
        <span>${it.l}</span>
        ${it.badge?`<span style="margin-left:auto;background:${GOLD};color:${NAVY};font-size:11px;font-weight:700;padding:2px 8px;border-radius:10px">${it.badge}</span>`:''}
      </div>`).join('')}
      <div style="margin-top:auto;padding:14px 12px;border-top:1px solid rgba(255,255,255,0.08)">
        <div style="display:flex;align-items:center;gap:10px">
          <div style="width:36px;height:36px;border-radius:18px;background:${GOLD};display:flex;align-items:center;justify-content:center;color:${NAVY};font-size:13px;font-weight:700">${ME.ini}</div>

// ============ LIVE SESSION (advocate side) ============

// ============ helpers ============
function toggleSpec(s){
  const cur=state.onbForm.specs;
  const next=cur.includes(s)?cur.filter(x=>x!==s):[...cur,s];
  setState({onbForm:{...state.onbForm,specs:next}});
}
function toggleDay(d){setState({availability:{...state.availability,[d]:!state.availability[d]}});}
window.toggleSpec=toggleSpec;window.toggleDay=toggleDay;
window.setState=setState;window.go=go;window.startSession=startSession;

function render(){
  const s=state.screen;
  const map={landing:renderLanding,onboarding:renderOnboarding,dashboard:renderDashboard,requests:renderRequests,calendar:renderCalendar,clients:renderClients,earnings:renderEarnings,profile:renderProfile,liveSession:renderLiveSession};
  document.getElementById('app').innerHTML=(map[s]||renderLanding)();
}
render();
</script>
