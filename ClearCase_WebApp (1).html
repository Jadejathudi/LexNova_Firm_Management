<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0"/>
<title>ClearCase — Legal · Verified</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}

:root{
  --cream:#F5F0E8;
  --cream-deep:#EDE8DF;
  --card:#FDFAF5;
  --navy:#0D1B3E;
  --navy-mid:#1A2F5C;
  --gold:#A8864A;
  --gold-light:#C9A96E;
  --gold-pale:#F5EDD8;
  --charcoal:#2C2C2C;
  --muted:#6B6352;
  --border:#DDD8CE;
  --white:#FFFFFF;
  --green:#2D7A4F;
  --green-bg:#EBF5EF;
  --red:#C0392B;
  --serif:'Playfair Display',Georgia,serif;
  --sans:'Inter',system-ui,sans-serif;
  --pill:100px;
}

html{scroll-behavior:smooth}
body{font-family:var(--sans);background:var(--cream);color:var(--charcoal);min-height:100vh;font-size:15px}

@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.35}}
.fade-up{animation:fadeUp 0.4s ease forwards}

/* ───── Buttons ───── */
.btn-primary{background:var(--gold);color:var(--navy);border:none;border-radius:var(--pill);padding:13px 26px;font-size:14px;font-weight:700;cursor:pointer;font-family:var(--sans);transition:background .2s;min-height:46px}
.btn-primary:active,.btn-primary:hover{background:var(--gold-light)}
.btn-secondary{background:transparent;color:var(--navy);border:1.5px solid var(--navy);border-radius:var(--pill);padding:13px 26px;font-size:14px;font-weight:600;cursor:pointer;font-family:var(--sans);min-height:46px;transition:background .2s,color .2s}
.btn-secondary:hover{background:var(--navy);color:var(--white)}

input,select,textarea{border:1.5px solid var(--border);border-radius:10px;padding:12px 14px;font-size:15px;width:100%;font-family:var(--sans);outline:none;background:var(--white);color:var(--charcoal)}
input:focus,select:focus,textarea:focus{border-color:var(--gold)}
label{font-size:12px;font-weight:700;color:var(--navy);text-transform:uppercase;letter-spacing:.05em;display:block;margin-bottom:7px}

.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px}
.eyebrow{font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--gold);margin-bottom:12px;display:block}
.pill-badge{display:inline-flex;align-items:center;gap:6px;background:var(--white);border:1px solid var(--border);border-radius:var(--pill);padding:6px 14px;font-size:12px;font-weight:500;color:var(--charcoal)}
.spec-badge{font-size:11px;border-radius:var(--pill);padding:3px 10px;font-weight:600;white-space:nowrap}

/* ───── Nav (mobile-first) ───── */
.nav{background:var(--white);border-bottom:1px solid var(--border);padding:0 16px;height:60px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:200}
.nav-logo{display:flex;align-items:center;gap:9px;cursor:pointer}
.nav-logo-mark{width:34px;height:34px;border-radius:8px;border:1.5px solid var(--navy);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:var(--navy);font-family:var(--serif);flex-shrink:0}
.nav-logo-name{font-size:16px;font-weight:700;color:var(--navy);font-family:var(--serif);line-height:1.1}
.nav-logo-sub{font-size:9px;font-weight:600;letter-spacing:.1em;color:var(--muted);text-transform:uppercase}
.nav-links{display:none}
.nav-cta-desktop{display:none}
.hamburger{margin-left:auto;width:42px;height:42px;border:1px solid var(--border);border-radius:10px;background:var(--white);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;cursor:pointer}
.hamburger span{width:18px;height:2px;background:var(--navy);border-radius:2px}

.mobile-menu{position:fixed;inset:60px 0 0 0;background:var(--white);z-index:190;padding:20px 16px;display:flex;flex-direction:column;gap:4px;overflow-y:auto}
.mobile-menu-link{padding:15px 14px;border-radius:12px;font-size:16px;font-weight:600;color:var(--navy);cursor:pointer}
.mobile-menu-link:active{background:var(--cream)}
.mobile-menu-section{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);padding:18px 14px 6px}

/* ───── Sticky mobile CTA ───── */
.sticky-cta{position:fixed;bottom:0;left:0;right:0;background:var(--white);border-top:1px solid var(--border);padding:12px 16px calc(12px + env(safe-area-inset-bottom));z-index:150;display:flex;gap:10px}
.sticky-cta .btn-primary{flex:1}

/* ───── Layout ───── */
.section{padding:48px 16px}
.container{max-width:1100px;margin:0 auto}
.grid-2,.grid-3,.grid-4{display:grid;grid-template-columns:1fr;gap:16px}
h1.display{font-family:var(--serif);font-size:34px;line-height:1.12}
h2.display{font-family:var(--serif);font-size:28px;line-height:1.15}

/* compliance strip */
.compliance-strip{background:var(--cream-deep);border-top:1px solid var(--border);padding:14px 16px;text-align:center;font-size:11px;color:var(--muted);line-height:1.6}

/* ───── Desktop ───── */
@media(min-width:768px){
  .nav{padding:0 40px;height:66px;gap:28px}
  .nav-links{display:flex;gap:24px;align-items:center}
  .nav-link{font-size:14px;font-weight:500;color:var(--charcoal);cursor:pointer;white-space:nowrap}
  .nav-link:hover{color:var(--gold)}
  .nav-cta-desktop{display:block;margin-left:auto}
  .hamburger{display:none}
  .sticky-cta{display:none}
  .section{padding:80px 40px}
  .grid-2{grid-template-columns:1fr 1fr;gap:24px}
  .grid-3{grid-template-columns:repeat(3,1fr);gap:20px}
  .grid-4{grid-template-columns:repeat(4,1fr);gap:24px}
  h1.display{font-size:52px}
  h2.display{font-size:40px}
  body{padding-bottom:0!important}
}
</style>
</head>
<body>
<div id="app"></div>
<script>

const C={navy:'#0D1B3E',gold:'#A8864A',goldLight:'#C9A96E',green:'#2D7A4F',greenBg:'#EBF5EF',red:'#C0392B',muted:'#6B6352'};

  {id:6,name:"Adv. Prasad Yeluri",ini:"PY",exp:18,specs:["Criminal","Corporate","Banking"],state:"Andhra Pradesh",city:"Amaravati",bio:"Enrolled since 2007. Former Additional Advocate General. Handles matters in criminal and corporate litigation.",available:true,langs:["Telugu","English","Hindi"]},
  {id:7,name:"Adv. Anand Mohan Rao",ini:"AM",exp:13,specs:["Income Tax","Corporate","Revenue"],state:"Telangana",city:"Hyderabad",bio:"Handles matters in income tax assessments, ITAT appeals, and TDS proceedings. Chartered Accountant turned advocate.",available:true,langs:["Telugu","English","Hindi"]},

const BENCH_SERVICES=[

  {icon:"⇄",t:"Second Opinion",d:"Already have an advocate? Get an independent judicial perspective before a major decision."},

/* Verticals — Corporate / Income Tax / Immigration */
const VERTICALS={
  corporate:{
    key:'corporate',icon:"🏢",label:"Corporate Law",
    h1a:"Legal clarity for",h1b:"your business.",
    sub:"Company incorporation to NCLT disputes — schedule consultations with advocates who handle corporate matters across Telangana & Andhra Pradesh.",
    matters:["Company incorporation & ROC compliance","Shareholder & founder disputes","Contract drafting & review consultations","NCLT / insolvency proceedings","Employment & POSH compliance","Commercial recovery suits"],
    journey:[

    ],

    matters:["Section 143(2) scrutiny notices","Reassessment (Section 148) proceedings","TDS default & penalty notices","ITAT & CIT(A) appeals","Search & seizure follow-up","Foreign income & disclosure questions"],

    ],

  },
  immigration:{
    key:'immigration',icon:"✈",label:"Immigration",
    h1a:"Visas, OCI, passports —",h1b:"handled with clarity.",

    formExtra:[{k:'matterDetail',l:'Immigration Matter',ph:'e.g. US B1/B2 refusal, OCI renewal'},{k:'country',l:'Country Involved',ph:'e.g. USA, UK, UAE'}],
  },
};

const STATS=[
  {stat:"50M+",sub:"cases pending in Indian courts"},
  {stat:"82%",sub:"of litigants don't know their case status"},
  {stat:"100%",sub:"of listed advocates Bar Council enrolled"},
  {stat:"30 min",sub:"free first consultation — no card required"},

/* ───── State ───── */
let S={
  screen:'landing',menuOpen:false,
  regStep:1,phone:'',otp:['','','','','',''],
  form:{name:'',state:'Telangana',city:'',matter:'',occupation:'',how:'',brief:''},
  vform:{},vertical:null,

  benchService:null,benchTier:null,benchStep:1,
  bform:{name:'',phone:'',caseStage:'',court:'',slot:''},
};
let sessionTimer=null;
function setState(p){Object.assign(S,p);render();}
function go(s,extra){setState(Object.assign({screen:s,menuOpen:false},extra||{}));window.scrollTo(0,0);}
function fmt(s){return String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0');}
function inr(n){return '₹'+n.toLocaleString('en-IN');}

function startSession(){
  setState({sessionPhase:'active'});
  if(sessionTimer)return;
  sessionTimer=setInterval(()=>{
    if(S.sessionPhase!=='active'){clearInterval(sessionTimer);sessionTimer=null;return;}
    const s=S.sessionSecs-1;
    if(s<=0){setState({sessionSecs:0,sessionPhase:'ending'});clearInterval(sessionTimer);sessionTimer=null;}
    else setState({sessionSecs:s});
  },1000);
}

/* ───── Shared components ───── */
function Nav(){

  return `<span class="spec-badge" style="background:${c}14;color:${c}">${spec}</span>`;

/* ══════════════ LANDING ══════════════ */
function renderLanding(){
  return `${Nav()}
  <!-- Hero -->
  <section style="padding:48px 16px 40px;background:var(--cream)">
    <div class="container">
      <div style="text-align:center;max-width:680px;margin:0 auto" class="fade-up">
        <span class="pill-badge" style="margin-bottom:20px"><span style="width:6px;height:6px;border-radius:50%;background:var(--green);display:inline-block"></span> Now serving Telangana &amp; Andhra Pradesh</span>

          ${slots.map(t=>`<div onclick="setState({selSlot:'${t}'})" style="padding:11px 6px;border-radius:10px;border:1.5px solid ${S.selSlot===t?'var(--gold)':'var(--border)'};background:${S.selSlot===t?'var(--gold-pale)':'var(--white)'};cursor:pointer;text-align:center;font-size:12px;font-weight:600;color:${S.selSlot===t?C.gold:'var(--navy)'}">${S.selSlot===t?'✓ ':''}${t}</div>`).join('')}
        </div>
      </div>

      <div class="card" style="margin-bottom:14px">
        <h3 style="font-family:var(--serif);font-size:15px;color:var(--navy);margin-bottom:14px">3. How would you like to meet?</h3>
        <div style="display:flex;gap:10px;flex-wrap:wrap">
          ${[{t:"video",i:"📹",l:"Video Call",d:"Secure link sent to you"},{t:"phone",i:"📞",l:"Phone Call",d:"+91 number only"},{t:"office",i:"🏢",l:"In-Person",d:a.city+" chambers"}].map(o=>`
          <div onclick="setState({meetType:'${o.t}'})" style="flex:1;min-width:140px;padding:14px 10px;border-radius:12px;border:1.5px solid ${S.meetType===o.t?'var(--navy)':'var(--border)'};background:${S.meetType===o.t?'var(--cream)':'var(--white)'};cursor:pointer;text-align:center">
            <div style="font-size:22px;margin-bottom:6px">${o.i}</div>
            <div style="font-size:13px;font-weight:700;color:var(--navy)">${o.l}</div>
            <div style="font-size:11px;color:var(--muted);margin-top:2px">${o.d}</div>
          </div>`).join('')}
        </div>
      </div>

      <div style="background:var(--gold-pale);border-radius:12px;padding:14px 18px;margin-bottom:20px;border-left:3px solid var(--gold)">
        <div style="font-size:13px;font-weight:700;color:var(--gold);margin-bottom:4px">💡 Boost your consultation quality</div>
        <div style="font-size:13px;color:var(--muted);line-height:1.6">Upload your FIR copy, property deed, contract, or notice after booking — your advocate reviews it before the call.</div>
      </div>

      <button class="btn-primary" onclick="go('session');startSession()" style="width:100%;padding:15px;font-size:15px">Confirm: ${S.selDate} June · ${S.selSlot} →</button>
    </div>
  </div>
  ${ComplianceStrip()}`;
}

/* ══════════════ SESSION ══════════════ */
function renderSession(){
  const a=S.selAdv;
  const secs=S.sessionSecs;
  const pct=Math.round(((1800-secs)/1800)*100);
  const urgent=secs<300;

  if(S.sessionPhase==='ending') return `${Nav()}
  <div style="min-height:80vh;background:var(--navy);display:flex;align-items:center;justify-content:center;padding:32px 16px">
    <div style="max-width:460px;width:100%;text-align:center">
      <div style="font-size:48px;margin-bottom:18px">⏰</div>
      <h2 style="font-family:var(--serif);color:var(--white);font-size:26px;margin-bottom:10px">Your 30-minute session has ended</h2>
      <p style="color:rgba(255,255,255,.55);font-size:14px;margin-bottom:30px">You've had a great conversation. We'd like to give you a little more time.</p>
      <div style="background:rgba(168,134,74,.12);border:1.5px solid var(--gold);border-radius:16px;padding:28px;margin-bottom:22px">
        <div style="font-size:36px;margin-bottom:10px">🎁</div>
        <div style="font-family:var(--serif);color:var(--gold-light);font-size:21px;font-weight:800;margin-bottom:8px">5 More Minutes — Our Gift</div>
        <div style="color:rgba(255,255,255,.6);font-size:13px;line-height:1.7;margin-bottom:18px">An extra 5 minutes on us. No charge. Finish your thoughts and ask your final questions.</div>
        <button class="btn-primary" onclick="setState({sessionPhase:'extended',sessionSecs:300});startSession()" style="width:100%;font-size:15px">Accept 5 Free Minutes →</button>
      </div>
      <div style="color:rgba(255,255,255,.35);font-size:13px">Done for today? <span onclick="go('retainer')" style="color:var(--gold-light);cursor:pointer;font-weight:600">View retainer options</span></div>
    </div>
  </div>`;

  return `${Nav()}
  <div style="min-height:calc(100vh - 60px);background:var(--navy);padding:24px 16px;display:flex;flex-direction:column;max-width:100%">
    <div class="container" style="width:100%;display:flex;flex-direction:column;flex:1">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap">
        <div style="width:44px;height:44px;border-radius:50%;background:var(--navy-mid);display:flex;align-items:center;justify-content:center;color:var(--gold);font-size:14px;font-weight:700;font-family:var(--serif)">${a.ini}</div>
        <div style="flex:1;min-width:140px">
          <div style="color:var(--white);font-weight:700;font-size:14px">${a.name}</div>
          <div style="display:flex;align-items:center;gap:6px;margin-top:2px">
            <div style="width:7px;height:7px;border-radius:50%;background:var(--green)"></div>
            <span style="color:var(--green);font-size:11px;font-weight:600">Session active</span>
          </div>
        </div>
        <div style="background:rgba(255,255,255,.05);border-radius:12px;padding:8px 16px;text-align:center;border:1px solid ${urgent?C.red:'rgba(255,255,255,.1)'}">
          <div style="color:${urgent?C.red:'var(--white)'};font-size:24px;font-weight:800;font-family:monospace;line-height:1">${fmt(secs)}</div>
          <div style="color:${urgent?C.red:'rgba(255,255,255,.4)'};font-size:10px;margin-top:2px">${S.sessionPhase==='extended'?'BONUS TIME':'remaining'}</div>
        </div>
      </div>
      <div style="background:rgba(255,255,255,.08);border-radius:3px;height:3px;margin-bottom:20px;overflow:hidden">
        <div style="height:100%;background:${urgent?C.red:'var(--gold)'};width:${pct}%;transition:width 1s linear"></div>
      </div>

      <div style="flex:1;background:rgba(255,255,255,.03);border-radius:14px;padding:18px;border:1px solid rgba(255,255,255,.07);display:flex;flex-direction:column;gap:14px;min-height:300px">
        <div style="display:flex;gap:10px">
          <div style="width:30px;height:30px;border-radius:50%;background:var(--navy-mid);display:flex;align-items:center;justify-content:center;color:var(--gold);font-size:10px;font-weight:700;flex-shrink:0;font-family:var(--serif)">${a.ini}</div>
          <div style="background:rgba(255,255,255,.07);border-radius:12px 12px 12px 0;padding:11px 14px;max-width:80%">
            <div style="color:var(--white);font-size:13px;line-height:1.6">Thank you for sharing those details. Based on what you've described, let me explain the process step by step...</div>
            <div style="color:rgba(255,255,255,.3);font-size:10px;margin-top:5px">10:04 AM</div>
          </div>
        </div>
        <div style="display:flex;gap:10px;justify-content:flex-end">
          <div style="background:var(--navy-mid);border-radius:12px 12px 0 12px;padding:11px 14px;max-width:80%">
            <div style="color:var(--white);font-size:13px;line-height:1.6">That's reassuring. What documents do I need for the next step?</div>
            <div style="color:rgba(255,255,255,.4);font-size:10px;margin-top:5px;text-align:right">10:06 AM ✓✓</div>
          </div>
        </div>
        <div style="margin-top:auto;display:flex;gap:8px">
          <input placeholder="Type your message..." style="flex:1;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:12px 14px;color:var(--white);font-size:14px"/>
          <button class="btn-primary" style="padding:12px 18px">Send</button>
        </div>
      </div>

      <div style="display:flex;gap:10px;margin-top:14px;flex-wrap:wrap">
        <button onclick="setState({sessionSecs:0,sessionPhase:'ending'})" style="background:rgba(255,255,255,.05);color:rgba(255,255,255,.4);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:9px 14px;font-size:12px;cursor:pointer">⏩ Demo: End Session</button>
        <button class="btn-primary" onclick="go('retainer')" style="padding:9px 18px;font-size:12px;margin-left:auto">View Retainer Plans</button>
      </div>
    </div>
  </div>`;
}

/* ══════════════ RETAINER ══════════════ */
function renderRetainer(){
  const a=S.selAdv;
  return `${Nav()}
  <div style="background:var(--navy);padding:44px 16px;text-align:center">
    <span class="eyebrow" style="color:var(--gold-light)">Ongoing Partnership</span>
    <h1 style="font-family:var(--serif);font-size:28px;color:var(--white);margin-bottom:8px">Retain ${a.name}</h1>
    <p style="color:rgba(255,255,255,.55);font-size:14px">Your advocate, always available.</p>
  </div>
  <div style="background:var(--cream);padding:40px 16px 80px">
    <div class="container">
      <div class="grid-3" style="margin-bottom:28px">
        ${[
          {name:"Essential",price:"₹4,999",highlight:false,features:["2 consultations per month","Dedicated advocate messaging","Case status tracking","Document vault (500 MB)","Email support"]},
          {name:"Standard",price:"₹9,999",highlight:true,features:["5 consultations per month","Priority advocate access","Same-day responses","Document vault (2 GB)","Court date reminders","Case strategy reviews"]},
          {name:"Premium",price:"₹19,999",highlight:false,features:["Unlimited consultations","Senior advocate + junior team","24-hour emergency access","Unlimited document storage","Quarterly legal audit","Bench session credit included"]},
        ].map(p=>`<div style="background:var(--white);border-radius:16px;padding:26px 22px;border:${p.highlight?'2px solid var(--gold)':'1px solid var(--border)'};position:relative">
          ${p.highlight?`<div style="position:absolute;top:-12px;left:50%;transform:translateX(-50%);background:var(--gold);color:var(--navy);font-size:11px;font-weight:700;padding:4px 16px;border-radius:var(--pill);white-space:nowrap">MOST POPULAR</div>`:''}
          <div style="font-size:12px;font-weight:700;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.05em">${p.name}</div>
          <div style="display:flex;align-items:baseline;gap:4px;margin-bottom:18px"><span style="font-family:var(--serif);font-size:28px;font-weight:800;color:var(--navy)">${p.price}</span><span style="font-size:13px;color:var(--muted)">/month</span></div>
          <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:22px">
            ${p.features.map(f=>`<div style="display:flex;gap:8px;align-items:flex-start;font-size:13px;color:var(--charcoal)"><span style="color:var(--green);flex-shrink:0;font-weight:700">✓</span>${f}</div>`).join('')}
          </div>
          <button class="${p.highlight?'btn-primary':'btn-secondary'}" style="width:100%;font-size:14px">Choose ${p.name}</button>
        </div>`).join('')}
      </div>
      <div style="background:var(--white);border-radius:14px;padding:22px;border:1px solid var(--border);max-width:640px;margin:0 auto">
        <h3 style="font-family:var(--serif);font-size:17px;color:var(--navy);margin-bottom:12px">Included in every plan</h3>
        <div class="grid-2" style="gap:8px">
          ${["Bar Council verified advocate","Case progress dashboard","Encrypted document storage","Court hearing reminders","GST-compliant invoicing","Cancel anytime — no lock-in"].map(f=>`<div style="display:flex;gap:8px;font-size:13px;color:var(--charcoal)"><span style="color:var(--green);font-weight:700">✓</span>${f}</div>`).join('')}
        </div>
      </div>
    </div>
  </div>
  ${ComplianceStrip()}`;
}

/* ───── Glue ───── */
function selectAdv(id){setState({selAdv:ADVOCATES.find(x=>x.id===id)});go('profile');}
window.selectAdv=selectAdv;window.setState=setState;window.go=go;window.startSession=startSession;window.render=render;window.S=S;
window.handleOtp=function(i,v){
  const o=[...S.otp];o[i]=v.slice(-1);setState({otp:o});
  if(v){const next=document.getElementById('otp'+(i+1));if(next)next.focus();}
};

function render(){
  const screens={landing:renderLanding,register:renderRegister,advocates:renderAdvocates,profile:renderProfile,booking:renderBooking,session:renderSession,retainer:renderRetainer,bench:renderBench,benchIntake:renderBenchIntake,benchConfirm:renderBenchConfirm,vertical:renderVertical,verticalIntake:renderVerticalIntake};
  document.getElementById('app').innerHTML=(screens[S.screen]||renderLanding)();
}
render();
</script>
</body>
</html>
