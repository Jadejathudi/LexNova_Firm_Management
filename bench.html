<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>The Bench — ClearCase</title>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,500&family=Jost:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#0C0E15;--parchment:#F4EFE4;--parchment-dark:#E8E0CC;
  --gold:#C4982A;--gold-light:#E2B94A;--gold-pale:#FBF5E6;
  --charcoal:#181B28;--charcoal-mid:#22263A;--charcoal-light:#2E324A;
  --gray:#6E7288;--gray-light:#A8ABBE;--white:#fff;
  --green:#15803D;--green-bg:#DCFCE7;
  --red:#DC2626;--amber:#D97706;
  --border:#2E324A;--border-gold:rgba(196,152,42,.3);
  --hc:#C4982A;--district:#8B9CB5;--senior:#A0A8C0;--junior:#7A8499;
}
body{font-family:'Jost',sans-serif;background:var(--ink);color:var(--parchment);line-height:1.6;overflow-x:hidden}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
@keyframes shimmer{0%{background-position:200% center}100%{background-position:-200% center}}
@keyframes gavel{0%,100%{transform:rotate(-8deg) translateY(0)}50%{transform:rotate(4deg) translateY(-4px)}}
@keyframes breathe{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.65;transform:scale(.96)}}
@keyframes slideIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(220,38,38,.4)}70%{box-shadow:0 0 0 10px rgba(220,38,38,0)}}
.fu{animation:fadeUp .55s ease forwards}
.fu2{animation:fadeUp .55s .12s ease forwards;opacity:0}
.fu3{animation:fadeUp .55s .24s ease forwards;opacity:0}
.fu4{animation:fadeUp .55s .36s ease forwards;opacity:0}

.btn{border:none;border-radius:3px;padding:11px 26px;font-size:14px;font-weight:600;cursor:pointer;font-family:'Jost',sans-serif;transition:all .18s;display:inline-flex;align-items:center;gap:7px;letter-spacing:.02em}
.btn-gold{background:var(--gold);color:var(--ink)}.btn-gold:hover{background:var(--gold-light);transform:translateY(-1px)}
.btn-og{background:transparent;color:var(--gold);border:1.5px solid var(--gold)}.btn-og:hover{background:rgba(196,152,42,.1)}
.btn-ghost{background:rgba(255,255,255,.07);color:var(--parchment);border:1px solid rgba(255,255,255,.12)}.btn-ghost:hover{background:rgba(255,255,255,.12)}
.btn-dark{background:var(--charcoal-mid);color:var(--gray-light);border:1px solid var(--border)}.btn-dark:hover{background:var(--charcoal-light)}
.btn-sm{padding:8px 16px;font-size:13px}

input,select,textarea{background:var(--charcoal-mid);border:1px solid var(--border);border-radius:3px;padding:11px 14px;font-size:14px;width:100%;font-family:'Jost',sans-serif;outline:none;color:var(--parchment);transition:border-color .15s}
input:focus,select:focus,textarea:focus{border-color:var(--gold)}
input::placeholder,textarea::placeholder{color:var(--gray)}
select option{background:var(--charcoal);color:var(--parchment)}

.card{background:var(--charcoal);border:1px solid var(--border);border-radius:4px}
.hover{transition:transform .22s,box-shadow .22s;cursor:pointer}
.hover:hover{transform:translateY(-4px);box-shadow:0 16px 48px rgba(0,0,0,.45)}

h1,h2,h3,h4{font-family:'EB Garamond',serif}
.serif{font-family:'EB Garamond',serif}
.gs{background:linear-gradient(90deg,var(--gold) 0%,var(--gold-light) 35%,#F5D060 55%,var(--gold) 80%);background-size:200% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:shimmer 5s linear infinite}
.label{font-size:11px;font-weight:700;letter-spacing:.16em;text-transform:uppercase}
.divider{height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}
.divider-subtle{height:1px;background:var(--border)}
.tag{display:inline-flex;align-items:center;font-size:11px;font-weight:700;border-radius:2px;padding:3px 9px;white-space:nowrap;letter-spacing:.04em}
.scarce{animation:breathe 3s ease-in-out infinite}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--gold);border-radius:2px}

/* Tier colors */
.tier-hc{color:var(--hc)}
.tier-district{color:var(--district)}
.tier-senior{color:var(--senior)}
.tier-junior{color:var(--junior)}

/* Step indicator */
.step-dot{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
</style>
</head>
<body>
<div id="app"></div>
<script>

// ── Tier config ────────────────────────────────────────────────
const TIERS = {
  hc:      {label:"Retired High Court Judge",    color:"#C4982A", bg:"rgba(196,152,42,.1)",  border:"rgba(196,152,42,.3)",  price:19999, rank:1, badge:"High Court"},
  district:{label:"Retired District Judge",       color:"#8B9CB5", bg:"rgba(139,156,181,.08)",border:"rgba(139,156,181,.25)",price:9999,  rank:2, badge:"District Court"},
  senior:  {label:"Retired Senior Civil Judge",   color:"#A0A8C0", bg:"rgba(160,168,192,.07)",border:"rgba(160,168,192,.2)", price:5999,  rank:3, badge:"Senior Civil"},
  junior:  {label:"Retired Junior Civil Judge",   color:"#7A8499", bg:"rgba(122,132,153,.07)",border:"rgba(122,132,153,.18)",price:3999,  rank:4, badge:"Junior Civil"},
};
const PLATFORM_FEE = 500; // shown as transparent add-on

// ── Judge data ─────────────────────────────────────────────────
// NOTE: No Supreme Court judges intentionally
const JUDGES = [
  {id:1,name:"Hon. Justice K.V. Ramaswamy Naidu (Retd.)",ini:"RN",tier:"hc",
   retired:2019,yearsOnBench:22,city:"Hyderabad",state:"Telangana",
   areas:["Criminal","Civil","Constitutional"],
   bio:"Former Judge of the Telangana High Court with 22 years on the bench. Deep experience in criminal appeals, bail jurisprudence, and civil appellate matters before the High Court.",
   education:"LLB — Osmania University · Enrolled 1978 · Elevated to HC Bench 1997",
   notable:"Criminal appeals, bail, constitutional challenges in HC",
   langs:["Telugu","English","Hindi"],slotsLeft:3,totalSlots:6,available:true},
  {id:2,name:"Hon. Justice Padmavathi Subramaniam (Retd.)",ini:"PS",tier:"hc",
   retired:2021,yearsOnBench:18,city:"Vijayawada",state:"Andhra Pradesh",
   areas:["Family","Civil","Consumer"],
   bio:"Former Judge of the Andhra Pradesh High Court. 18 years presiding over family law appeals, civil appellate matters, and consumer protection cases at the High Court level.",
   education:"LLB — Andhra University · Enrolled 1980 · Elevated to HC Bench 2003",
   notable:"Matrimonial appeals, civil appellate, consumer law",
   langs:["Telugu","English"],slotsLeft:4,totalSlots:6,available:true},
  {id:3,name:"Shri. B. Venkateswara Rao (Retd.)",ini:"VR",tier:"district",
   retired:2022,yearsOnBench:16,city:"Hyderabad",state:"Telangana",
   areas:["Criminal","Revenue","Civil"],
   bio:"Retired District & Sessions Judge with 16 years presiding over criminal sessions, revenue matters, and civil trials in Hyderabad district courts. Extensive first-hand knowledge of ground-level court procedure.",
   education:"LLB — Osmania University · Enrolled 1986 · District Judge 2006",
   notable:"Sessions trials, bail, revenue disputes, civil execution",
   langs:["Telugu","English","Urdu"],slotsLeft:5,totalSlots:8,available:true},
  {id:4,name:"Shri. G. Nagabhushanam (Retd.)",ini:"GN",tier:"district",
   retired:2023,yearsOnBench:14,city:"Vijayawada",state:"Andhra Pradesh",
   areas:["Civil","Family","Revenue"],
   bio:"Retired District Judge with 14 years across AP district courts. Particularly experienced in land and property disputes, family matters, and revenue tribunal appeals.",
   education:"LLB — Andhra University · Enrolled 1989 · District Judge 2009",
   notable:"Land disputes, property litigation, family matters",
   langs:["Telugu","English"],slotsLeft:6,totalSlots:8,available:true},
  {id:5,name:"Smt. Lakshmi Devi Prasanna (Retd.)",ini:"LP",tier:"senior",
   retired:2023,yearsOnBench:14,city:"Warangal",state:"Telangana",
   areas:["Family","Civil","Consumer"],
   bio:"Retired Principal Judge, Family Court. 14 years presiding over matrimonial matters, child custody disputes, maintenance proceedings, and domestic violence cases across Telangana.",
   education:"LLB — Kakatiya University · Enrolled 1989 · Principal Family Judge 2009",
   notable:"Matrimonial law, child custody, domestic violence, maintenance",
   langs:["Telugu","English"],slotsLeft:0,totalSlots:8,available:false},
  {id:6,name:"Shri. T. Srinivasulu (Retd.)",ini:"TS",tier:"senior",
   retired:2022,yearsOnBench:12,city:"Hyderabad",state:"Telangana",
   areas:["Civil","Consumer","Revenue"],
   bio:"Retired Senior Civil Judge with 12 years handling civil suits, consumer disputes, and revenue matters in Hyderabad. Known for clear and thorough written orders.",
   education:"LLB — Osmania University · Enrolled 1990 · Civil Judge 2010",
   notable:"Civil suits, consumer protection, small causes",
   langs:["Telugu","English"],slotsLeft:7,totalSlots:10,available:true},
  {id:7,name:"Smt. M. Anuradha (Retd.)",ini:"MA",tier:"junior",
   retired:2024,yearsOnBench:10,city:"Visakhapatnam",state:"Andhra Pradesh",
   areas:["Civil","Family","Consumer"],
   bio:"Recently retired Junior Civil Judge with 10 years in Visakhapatnam civil courts. Fresh judicial perspective combined with knowledge of evolving court practice and procedure.",
   education:"LLB — Andhra University · Enrolled 1994 · Civil Judge 2014",
   notable:"Civil suits, consumer cases, family matters",
   langs:["Telugu","English"],slotsLeft:8,totalSlots:10,available:true},
];

// ── Services ───────────────────────────────────────────────────
const SERVICES = [
  {id:"review",  icon:"📋", name:"Case Review",           dur:"60 min call",  desc:"The judge reviews the structured notes from your intake call and gives a frank judicial assessment of where your case stands."},
  {id:"second",  icon:"🔍", name:"Second Opinion",         dur:"45 min call",  desc:"Share your advocate's strategy. The judge gives an independent view on whether the approach is sound — and what they would do differently."},
  {id:"prehear", icon:"⚖️", name:"Pre-Hearing Readiness",  dur:"45 min call",  desc:"Is your case actually ready to go before court? The judge does a structured readiness check — same rigour they applied from the bench."},
  {id:"settle",  icon:"🤝", name:"Settlement Assessment",  dur:"30 min call",  desc:"Has the other side made an offer? The judge tells you what courts actually award in comparable cases — so you can decide with full information."},
];

// ── How it works steps ─────────────────────────────────────────
const STEPS = [
  {n:"01", t:"Choose a judge & pay", d:"Browse the directory by court tier and area of practice. Select a service, pay the session fee online. Your slot is reserved immediately."},
  {n:"02", t:"20-minute intake call", d:"A ClearCase legal team member calls you within 24 hours. They take structured notes on your matter — facts, documents, questions, what you need the judge to address."},
  {n:"03", t:"Notes submitted to the judge", d:"Your case notes are prepared and sent to the judge before the session. The judge reviews them fully — so they arrive prepared, not cold."},
  {n:"04", t:"Your session with the judge", d:"A video or phone call with the retired judge. They share their judicial perspective on your matter — candid, experienced, and grounded in real courtroom decisions."},
  {n:"05", t:"Session notes to you", d:"A summary of the judge's key points is sent to your ClearCase account. Share with your advocate, use it to prepare, or keep it for reference."},
];

const PLATFORM_DISCLAIMER = `ClearCase is a technology platform. Retired judges on The Bench are not practicing advocates. Sessions are knowledge consultations, not legal advice, and do not create any legal relationship. Judges set their own consultation rates; ClearCase adds a platform facilitation fee.`;

let state = {
  screen:"landing",
  tierFilter:"all", areaFilter:"all",
  selJudge:JUDGES[0],
  selDate:14, selSlot:"", meetType:"video",
  bookingService:"review",
  sessionSecs:2700, sessionPhase:"active",
  consentShown:false, recordConsent:false,
};
let sessionTimer=null;

function ss(p){Object.assign(state,p);render();}
function go(s){ss({screen:s});window.scrollTo(0,0);}
function fmt(s){return String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0');}
function selectJudge(id){
  ss({selJudge:JUDGES.find(j=>j.id===id),consentShown:false,sessionSecs:2700,sessionPhase:"active"});
  go('profile');
}
function startSession(){
  if(sessionTimer)return;
  sessionTimer=setInterval(()=>{
    const s=state.sessionSecs-1;
    if(s<=0){clearInterval(sessionTimer);sessionTimer=null;ss({sessionSecs:0,sessionPhase:"ended"});}
    else ss({sessionSecs:s});
  },1000);
}
window.ss=ss; window.go=go; window.selectJudge=selectJudge;

// ── Helpers ────────────────────────────────────────────────────
function Avatar(j,sz=64){
  const t=TIERS[j.tier];
  return `<div style="position:relative;flex-shrink:0;display:inline-block">
    <div style="width:${sz}px;height:${sz}px;border-radius:50%;background:linear-gradient(135deg,${t.color}22,${t.color}44);border:2px solid ${t.color};display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative">
      <svg width="${sz}" height="${sz}" viewBox="0 0 64 64" fill="none" style="position:absolute;inset:0">
        <circle cx="32" cy="23" r="10" fill="${t.color}" opacity=".22"/>
        <ellipse cx="32" cy="50" rx="18" ry="11" fill="${t.color}" opacity=".16"/>
      </svg>
      <span style="position:relative;z-index:1;font-family:'EB Garamond',serif;font-size:${Math.round(sz*.3)}px;font-weight:700;color:${t.color}">${j.ini}</span>
    </div>
    <div style="position:absolute;bottom:-3px;right:-3px;background:${t.color};width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;border:2px solid var(--charcoal)">⚖</div>
  </div>`;
}

function TierBadge(tier){
  const t=TIERS[tier];
  return `<span class="tag" style="background:${t.bg};color:${t.color};border:1px solid ${t.border}">${t.badge}</span>`;
}

function SlotBar(left,total){
  const full=left===0, scarce=left<=2&&left>0;
  const pct=total===0?0:(left/total)*100;
  return `<div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px">
      <span style="font-size:11px;font-weight:700;letter-spacing:.06em;color:${full?'var(--gray)':scarce?'#FCA5A5':'var(--gold)'}">
        ${full?'Fully Booked This Month':scarce?`⚡ ${left} session${left!==1?'s':''} left`:`${left} of ${total} sessions available`}
      </span>
    </div>
    <div style="height:3px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden">
      <div style="height:100%;width:${pct}%;background:${full?'rgba(255,255,255,.06)':scarce?'var(--red)':'var(--gold)'};border-radius:2px"></div>
    </div>
  </div>`;
}

function JudgeCard(j){
  const t=TIERS[j.tier];
  const isFull=j.slotsLeft===0, isScarce=j.slotsLeft<=2&&j.slotsLeft>0;
  return `<div class="card hover" onclick="selectJudge(${j.id})" style="padding:28px;border-color:${t.border};background:linear-gradient(135deg,var(--charcoal),${t.bg})">
    <div style="display:flex;gap:16px;align-items:flex-start;margin-bottom:16px">
      ${Avatar(j,60)}
      <div style="flex:1;min-width:0">
        <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px;flex-wrap:wrap;margin-bottom:6px">
          <h3 style="font-size:17px;font-weight:600;color:var(--parchment);line-height:1.3">${j.name}</h3>
          ${isScarce?`<span class="tag scarce" style="background:rgba(220,38,38,.15);color:#FCA5A5;border:1px solid rgba(220,38,38,.3)">⚡ ${j.slotsLeft} left</span>`:''}
          ${isFull?`<span class="tag" style="background:rgba(255,255,255,.05);color:var(--gray)">Fully Booked</span>`:''}
        </div>
        ${TierBadge(j.tier)}
        <div style="font-size:12px;color:var(--gray);margin-top:6px">${j.yearsOnBench} yrs on bench · ${j.city} · Retired ${j.retired}</div>
      </div>
    </div>
    <div style="font-size:13px;color:var(--gray-light);line-height:1.7;margin-bottom:14px;font-family:'EB Garamond',serif">${j.bio.split('.').slice(0,2).join('.')}.</div>
    <div style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:14px">
      ${j.areas.map(a=>`<span class="tag" style="background:rgba(255,255,255,.04);color:var(--gray-light);border:1px solid var(--border)">${a}</span>`).join('')}
    </div>
    ${SlotBar(j.slotsLeft,j.totalSlots)}
    <div style="display:flex;align-items:center;justify-content:space-between;margin-top:14px">
      <div>
        <div style="font-size:11px;color:var(--gray);margin-bottom:2px">Judge's consultation rate</div>
        <div style="font-family:'EB Garamond',serif;font-size:22px;font-weight:700;color:${t.color}">₹${t.price.toLocaleString()}</div>
      </div>
      <button class="btn ${isFull?'btn-dark':'btn-gold'} btn-sm" onclick="selectJudge(${j.id})">${isFull?'Join Waitlist':'View & Book →'}</button>
    </div>
  </div>`;
}

// ── NAV ────────────────────────────────────────────────────────
function Nav(){
  return `<nav style="background:var(--charcoal);border-bottom:1px solid var(--border);padding:0 48px;height:62px;display:flex;align-items:center;position:sticky;top:0;z-index:100;gap:24px;box-shadow:0 2px 20px rgba(0,0,0,.3)">
    <span onclick="go('landing')" style="cursor:pointer;display:flex;align-items:center;gap:10px">
      <span style="color:var(--gold);font-size:20px">⚖</span>
      <div>
        <div style="font-family:'EB Garamond',serif;font-size:17px;font-weight:600;color:var(--parchment);line-height:1">The Bench</div>
        <div style="font-size:9px;color:var(--gray);letter-spacing:.14em;text-transform:uppercase">by ClearCase</div>
      </div>
    </span>
    <div style="width:1px;height:26px;background:var(--border)"></div>
    ${["Directory","How It Works","Services"].map(t=>`<span onclick="go('${t.toLowerCase().replace(/ /g,'-')}')" style="color:var(--gray-light);font-size:14px;cursor:pointer;font-weight:500;transition:color .15s" onmouseover="this.style.color='var(--gold)'" onmouseout="this.style.color='var(--gray-light)'">${t}</span>`).join('')}
    <div style="flex:1"></div>
    <button onclick="go('directory')" class="btn btn-og btn-sm">Browse Judges</button>
    <button onclick="history.back?history.back():go('landing')" class="btn btn-ghost btn-sm">← Back to ClearCase</button>
  </nav>`;
}

// ── Disclaimer strip ───────────────────────────────────────────
function Disc(){
  return `<div style="background:rgba(196,152,42,.06);border-bottom:1px solid var(--border-gold);padding:8px 48px">
    <p style="font-size:12px;color:var(--gray);max-width:1100px;margin:0 auto;line-height:1.5">⚖ ${PLATFORM_DISCLAIMER}</p>
  </div>`;
}

// ══════════════════════════════════════════════════════════════
// LANDING
// ══════════════════════════════════════════════════════════════
function renderLanding(){
  const featured=JUDGES.filter(j=>j.tier==='hc');
  return `${Nav()}${Disc()}
  <!-- Hero -->
  <section style="position:relative;overflow:hidden;padding:110px 80px 90px;text-align:center;background:radial-gradient(ellipse 80% 60% at 50% 0%,rgba(196,152,42,.1) 0%,transparent 65%),var(--ink)">
    <div style="position:absolute;inset:0;opacity:.025" style="background-image:url('data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2240%22 height=%2240%22><rect width=%2240%22 height=%2240%22 fill=%22none%22/><path d=%22M0 20h40M20 0v40%22 stroke=%22white%22 stroke-width=%22.4%22 opacity=%22.5%22/></svg>');background-size:40px 40px"></div>
    <div style="max-width:820px;margin:0 auto">
      <div style="font-size:52px;margin-bottom:24px;display:inline-block;animation:gavel 7s ease-in-out infinite" class="fu">⚖️</div>
      <div class="label fu2" style="color:var(--gold);margin-bottom:18px">Exclusive to ClearCase · Telangana &amp; Andhra Pradesh</div>
      <h1 class="fu2" style="font-size:58px;font-weight:700;line-height:1.1;margin-bottom:22px">
        Decades on the Bench.<br>
        <span class="gs">Now Answering Your Questions.</span>
      </h1>
      <p class="fu3" style="font-size:17px;color:var(--gray-light);line-height:1.82;max-width:600px;margin:0 auto 14px;font-family:'EB Garamond',serif;font-style:italic">
        Retired judges from the High Courts and subordinate courts of Telangana and Andhra Pradesh — offering their judicial perspective on your legal matter. Available exclusively through ClearCase.
      </p>
      <p class="fu3" style="font-size:13px;color:var(--gray);margin-bottom:44px">Sessions are knowledge consultations. Not legal advice.</p>
      <div class="fu4" style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap">
        <button class="btn btn-gold" onclick="go('directory')" style="padding:15px 40px;font-size:15px">Meet the Judges →</button>
        <button class="btn btn-ghost" onclick="go('how-it-works')" style="padding:15px 40px;font-size:15px">How It Works</button>
      </div>
    </div>

    <!-- Platform stats -->
    <div class="fu4" style="display:grid;grid-template-columns:repeat(4,1fr);max-width:680px;margin:64px auto 0;border:1px solid var(--border);border-radius:4px;overflow:hidden;background:var(--charcoal)">
      ${[
        [`${JUDGES.length}`, "Judges", "on The Bench"],
        ["HC to Civil", "Four tiers", "of judicial experience"],
        ["24 hrs", "Intake call", "within one day"],
        ["Only here", "Exclusive", "to ClearCase"],
      ].map(([v,l,s],i)=>`<div style="padding:22px 12px;text-align:center;${i<3?'border-right:1px solid var(--border);':''}">
        <div style="font-family:'EB Garamond',serif;font-size:24px;font-weight:700;color:var(--gold)">${v}</div>
        <div style="font-size:12px;font-weight:700;color:var(--parchment);margin-top:3px">${l}</div>
        <div style="font-size:11px;color:var(--gray);margin-top:2px">${s}</div>
      </div>`).join('')}
    </div>
  </section>

  <div class="divider"></div>

  <!-- What The Bench is -->
  <section style="padding:90px 80px;background:var(--charcoal)">
    <div style="max-width:1100px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:80px;align-items:center">
      <div>
        <div class="label" style="color:var(--gold);margin-bottom:14px">A resource that didn't exist before</div>
        <h2 style="font-size:42px;font-weight:700;line-height:1.2;margin-bottom:22px">The knowledge that sits inside a judge's mind.</h2>

      <!-- Chat -->
      <div style="flex:1;background:var(--charcoal);border-radius:4px;padding:14px;border:1px solid var(--border);display:flex;flex-direction:column;gap:10px;min-height:140px">
        <div style="display:flex;gap:8px">${Avatar(j,30)}<div style="background:rgba(255,255,255,.06);border-radius:8px 8px 8px 0;padding:9px 13px;max-width:72%"><div style="color:var(--parchment);font-size:13px;line-height:1.65;font-family:'EB Garamond',serif">I have reviewed the brief your team prepared. The matter presents an interesting question on the admissibility of the documentary evidence. Let me share how I would approach it...</div><div style="color:var(--gray);font-size:10px;margin-top:4px">10:04 AM</div></div></div>
        <div style="margin-top:auto;display:flex;gap:7px"><input placeholder="Ask the judge..." style="flex:1;border-radius:2px;padding:10px 12px;font-size:13px"/><button class="btn btn-gold btn-sm">Send</button></div>
      </div>
      <div style="margin-top:8px"><button onclick="ss({sessionSecs:0,sessionPhase:'ended'})" style="background:rgba(255,255,255,.03);color:var(--gray);border:1px solid var(--border);border-radius:2px;padding:6px 11px;font-size:10px;cursor:pointer;font-family:'Jost',sans-serif">⏩ Demo: End Session</button></div>
    </div>
    <!-- Sidebar -->
    <div style="background:var(--charcoal);border-left:1px solid var(--border);padding:22px 16px;display:flex;flex-direction:column;gap:14px">
      <h3 style="font-family:'EB Garamond',serif;font-size:16px;font-weight:600;color:var(--parchment)">Session Notes</h3>
      <textarea placeholder="Key points from the judge's perspective..." style="flex:1;border-radius:2px;padding:11px;font-size:12px;resize:none;min-height:200px;line-height:1.7;font-family:'EB Garamond',serif" rows="10"></textarea>
      <div class="divider-subtle"></div>
      <div><div style="font-size:11px;font-weight:700;color:var(--gold);letter-spacing:.08em;text-transform:uppercase;margin-bottom:4px">Service booked</div><div style="font-size:13px;color:var(--gray-light);font-family:'EB Garamond',serif">${SERVICES.find(s=>s.id===state.bookingService)?.name||'Case Review'}</div></div>
      <div class="divider-subtle"></div>
      <div style="background:rgba(196,152,42,.06);border:1px solid rgba(196,152,42,.15);border-radius:3px;padding:13px">
        <div style="font-size:11px;font-weight:700;color:var(--gold);margin-bottom:7px;letter-spacing:.06em;text-transform:uppercase">After this session</div>
        <div style="font-size:12px;color:var(--gray-light);line-height:1.8">• Session summary saved to your ClearCase vault<br>• Share the summary with your advocate<br>• Return to The Bench for follow-up sessions<br>• Continued access to ClearCase tools</div>
      </div>
    </div>
  </div>`;
}

// ── Router ─────────────────────────────────────────────────────
function render(){
  const screens={
    landing:renderLanding, directory:renderDirectory,
    services:renderServices, profile:renderProfile,
    booking:renderBooking, session:renderSession,
    'how-it-works':renderHow,
  };
  document.getElementById('app').innerHTML=(screens[state.screen]||renderLanding)();
}
render();
</script>
</body>
</html>
